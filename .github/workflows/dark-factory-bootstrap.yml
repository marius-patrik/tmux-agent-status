name: DarkFactory Bootstrap

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  managed-setup:
    name: Managed setup
    runs-on: ubuntu-24.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify managed setup
        run: node .github/scripts/dark-factory-managed-check.mjs
